services:
  postgres-test:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tuitionschool_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data # ephemeral: fresh schema every restart

  redis-test:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6380:6379'
